<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музейный гид</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--tg-theme-hint-color, #ccc);
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--tg-theme-button-color, #40a7e3);
        }
        
        .section {
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .card:active {
            transform: scale(0.98);
        }
        
        .card-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--tg-theme-button-color, #40a7e3);
        }
        
        .card-description {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666);
            margin-bottom: 8px;
        }
        
        .card-meta {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #999);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .badge {
            background: var(--tg-theme-button-color, #40a7e3);
            color: white;
            padding: 4px 8px;
            border-radius: 16px;
            font-size: 12px;
            display: inline-block;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .menu-item {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            padding: 16px 8px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
        }
        
        .menu-item:active {
            opacity: 0.8;
        }
        
        .back-button {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 16px;
            cursor: pointer;
        }
        
        .hidden {
            display: none;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #999);
        }
        
        .count {
            background: var(--tg-theme-button-color, #40a7e3);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .filter-buttons {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 12px;
        }
        
        .filter-button {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
        }
        
        .filter-button.active {
            background: var(--tg-theme-button-color, #40a7e3);
            color: white;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0,0,0,0.1);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--tg-theme-button-color, #40a7e3);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">Загрузка данных...</div>
    
    <div id="main-menu" class="hidden">
        <div class="header">
            <h1 id="museum-name">🏛️ Музей искусств</h1>
            <p id="museum-short"></p>
        </div>
        
        <div class="menu-grid">
            <div class="menu-item" onclick="showSection('museum')">О музее</div>
            <div class="menu-item" onclick="showSection('exhibitions')">Выставки</div>
            <div class="menu-item" onclick="showSection('events')">Мероприятия</div>
            <div class="menu-item" onclick="showSection('contacts')">Контакты</div>
        </div>
        
        <div class="section">
            <div class="section-title">
                <span>🌟 Рекомендуем сегодня</span>
            </div>
            <div id="featured-events"></div>
        </div>
    </div>
    
    <div id="museum-section" class="hidden">
        <div class="back-button" onclick="showMainMenu()">← Назад</div>
        <div class="header">
            <h1>О музее</h1>
        </div>
        <div class="section" id="museum-info"></div>
    </div>
    
    <div id="exhibitions-section" class="hidden">
        <div class="back-button" onclick="showMainMenu()">← Назад</div>
        <div class="header">
            <h1>Выставки</h1>
        </div>
        <div class="filter-buttons">
            <div class="filter-button active" onclick="filterExhibitions('all')">Все</div>
            <div class="filter-button" onclick="filterExhibitions('permanent')">Постоянные</div>
            <div class="filter-button" onclick="filterExhibitions('temporary')">Временные</div>
        </div>
        <div class="section" id="exhibitions-list"></div>
    </div>
    
    <div id="events-section" class="hidden">
        <div class="back-button" onclick="showMainMenu()">← Назад</div>
        <div class="header">
            <h1>Мероприятия</h1>
        </div>
        <div class="filter-buttons">
            <div class="filter-button active" onclick="filterEvents('all')">Все</div>
            <div class="filter-button" onclick="filterEvents('excursion')">🚶 Экскурсии</div>
            <div class="filter-button" onclick="filterEvents('lecture')">📚 Лекции</div>
            <div class="filter-button" onclick="filterEvents('masterclass')">🎨 Мастер-классы</div>
            <div class="filter-button" onclick="filterEvents('concert')">🎵 Концерты</div>
        </div>
        <div class="section" id="events-list"></div>
    </div>
    
    <div id="contacts-section" class="hidden">
        <div class="back-button" onclick="showMainMenu()">← Назад</div>
        <div class="header">
            <h1>Контакты</h1>
        </div>
        <div class="section" id="contacts-info"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('secondary_bg_color');
        
        // Данные по умолчанию
        let museumData = {
            name: 'Государственный музей искусств',
            address: 'г. Москва, ул. Тверская, 15',
            workHours: '10:00 - 20:00',
            phone: '+7 (495) 123-45-67',
            priceInfo: '500 руб.',
            description: 'Крупнейший музей искусства',
            mainImage: null,
            gallery: []
        };
        
        let exhibitions = [];
        let events = [];
        let filteredExhibitions = [];
        let filteredEvents = [];
        
        // Получаем данные из URL параметров
        function getDataFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const dataParam = urlParams.get('data');
            
            if (dataParam) {
                try {
                    const decodedData = atob(dataParam);
                    const data = JSON.parse(decodedData);
                    
                    if (data.museum) museumData = data.museum;
                    if (data.exhibitions) exhibitions = data.exhibitions;
                    if (data.events) events = data.events;
                    
                    console.log('Данные загружены из URL:', data);
                } catch (e) {
                    console.error('Ошибка загрузки данных:', e);
                    loadDefaultData();
                }
            } else {
                loadDefaultData();
            }
            
            // Скрываем загрузку, показываем меню
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            
            // Обновляем отображение
            document.getElementById('museum-name').textContent = `🏛️ ${museumData.name}`;
            loadFeaturedEvents();
        }
        
        // Загрузка данных по умолчанию (если нет данных из бота)
        function loadDefaultData() {
            exhibitions = [
                {
                    name: 'Основная экспозиция',
                    description: 'Постоянная экспозиция музея',
                    type: 'permanent',
                    halls: ['Зал 1', 'Зал 2']
                },
                {
                    name: 'Современное искусство',
                    description: 'Выставка современных художников',
                    type: 'temporary',
                    dates: '01.03 - 30.05.2024',
                    curator: 'Анна Иванова'
                }
            ];
            
            events = [
                {
                    name: 'Обзорная экскурсия',
                    description: 'Знакомство с музеем',
                    date: 'Завтра',
                    time: '15:00',
                    price: '300 руб.'
                }
            ];
        }
        
        function showMainMenu() {
            hideAllSections();
            document.getElementById('main-menu').classList.remove('hidden');
        }
        
        function showSection(section) {
            hideAllSections();
            document.getElementById(section + '-section').classList.remove('hidden');
            
            switch(section) {
                case 'museum':
                    loadMuseumInfo();
                    break;
                case 'exhibitions':
                    filteredExhibitions = exhibitions;
                    loadExhibitions();
                    break;
                case 'events':
                    filteredEvents = events;
                    loadEvents();
                    break;
                case 'contacts':
                    loadContacts();
                    break;
            }
        }
        
        function hideAllSections() {
            const sections = ['main-menu', 'museum-section', 'exhibitions-section', 'events-section', 'contacts-section'];
            sections.forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
        }
        
        function loadMuseumInfo() {
            const container = document.getElementById('museum-info');
            container.innerHTML = `
                <div class="card">
                    <div class="card-title">${museumData.name}</div>
                    <div class="card-description">${museumData.description || ''}</div>
                    <div class="card-meta">
                        <span>📍 ${museumData.address}</span>
                    </div>
                    <div class="card-meta">
                        <span>🕒 ${museumData.workHours}</span>
                    </div>
                    <div class="card-meta">
                        <span>📞 ${museumData.phone}</span>
                    </div>
                    <div class="card-meta">
                        <span>💰 ${museumData.priceInfo}</span>
                    </div>
                </div>
            `;
        }
        
        function filterExhibitions(type) {
            // Обновляем активную кнопку
            document.querySelectorAll('.filter-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Фильтруем
            if (type === 'all') {
                filteredExhibitions = exhibitions;
            } else {
                filteredExhibitions = exhibitions.filter(ex => ex.type === type);
            }
            
            loadExhibitions();
        }
        
        function loadExhibitions() {
            const container = document.getElementById('exhibitions-list');
            if (!filteredExhibitions || filteredExhibitions.length === 0) {
                container.innerHTML = '<div class="card">Нет выставок в этой категории</div>';
                return;
            }
            
            let html = '';
            filteredExhibitions.forEach(ex => {
                const typeIcon = ex.type === 'permanent' ? '🏛️' : '🖼️';
                const typeText = ex.type === 'permanent' ? 'Постоянная' : 'Временная';
                
                html += `
                    <div class="card" onclick="showExhibitionDetails(${ex.id})">
                        <div class="card-title">${typeIcon} ${ex.name}</div>
                        <span class="badge">${typeText}</span>
                        <div class="card-description">${ex.description}</div>
                        ${ex.dates ? `<div class="card-meta">📅 ${ex.dates}</div>` : ''}
                        ${ex.curator ? `<div class="card-meta">👤 Куратор: ${ex.curator}</div>` : ''}
                        ${ex.halls ? `<div class="card-meta">🏛️ Залы: ${ex.halls.length}</div>` : ''}
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function filterEvents(type) {
            // Обновляем активную кнопку
            document.querySelectorAll('#events-section .filter-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Фильтруем
            if (type === 'all') {
                filteredEvents = events;
            } else {
                filteredEvents = events.filter(ev => ev.type === type);
            }
            
            loadEvents();
        }
        
        function loadEvents() {
            const container = document.getElementById('events-list');
            if (!filteredEvents || filteredEvents.length === 0) {
                container.innerHTML = '<div class="card">Нет мероприятий в этой категории</div>';
                return;
            }
            
            let html = '';
            filteredEvents.forEach(ev => {
                const typeIcons = {
                    'excursion': '🚶',
                    'lecture': '📚',
                    'masterclass': '🎨',
                    'concert': '🎵',
                    'special': '✨'
                };
                const icon = typeIcons[ev.type] || '📌';
                
                // Процент заполненных мест
                const percent = ev.max_participants ? (ev.current / ev.max_participants * 100) : 0;
                const free = ev.max_participants ? ev.max_participants - ev.current : '∞';
                
                html += `
                    <div class="card" onclick="bookEvent('${ev.name}')">
                        <div class="card-title">${icon} ${ev.name}</div>
                        <div class="card-description">${ev.description}</div>
                        <div class="card-meta">
                            <span>📅 ${ev.date} ${ev.time}</span>
                            <span>💰 ${ev.price}</span>
                        </div>
                        <div class="card-meta">📍 ${ev.location}</div>
                        <div class="card-meta">
                            <span>👥 Свободно: ${free}</span>
                        </div>
                        ${ev.max_participants ? `
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${percent}%"></div>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function loadContacts() {
            const container = document.getElementById('contacts-info');
            container.innerHTML = `
                <div class="card">
                    <div class="card-title">Контактная информация</div>
                    <div class="card-meta">📱 Телефон: ${museumData.phone}</div>
                    <div class="card-meta">📧 Email: info@${museumData.website || 'museum.ru'}</div>
                    <div class="card-meta">📍 Адрес: ${museumData.address}</div>
                    <div class="card-meta">🕒 Часы работы: ${museumData.workHours}</div>
                </div>
            `;
        }
        
        function loadFeaturedEvents() {
            const container = document.getElementById('featured-events');
            if (!events || events.length === 0) {
                container.innerHTML = '<div class="card">Нет мероприятий</div>';
                return;
            }
            
            let html = '';
            events.slice(0, 2).forEach(ev => {
                html += `
                    <div class="card" onclick="showSection('events')">
                        <div class="card-title">${ev.name}</div>
                        <div class="card-meta">📅 ${ev.date}</div>
                        <div class="card-meta">💰 ${ev.price}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function bookEvent(eventName) {
            tg.sendData(JSON.stringify({
                action: 'book_ticket',
                event: eventName
            }));
            
            tg.showAlert(`✅ Вы выбрали: ${eventName}`);
        }
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            getDataFromUrl();
            
            tg.MainButton.setText('Закрыть');
            tg.MainButton.onClick(function() {
                tg.close();
            });
        });
    </script>
</body>
</html>
