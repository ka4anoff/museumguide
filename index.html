<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музейный гид</title>
    <!-- Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--tg-theme-hint-color, #ccc);
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--tg-theme-button-color, #40a7e3);
        }
        
        .section {
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            color: var(--tg-theme-text-color, #000000);
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .card:active {
            transform: scale(0.98);
        }
        
        .card-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--tg-theme-button-color, #40a7e3);
        }
        
        .card-description {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666);
            margin-bottom: 8px;
        }
        
        .card-meta {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #999);
            display: flex;
            gap: 12px;
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .menu-item {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            padding: 16px 8px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
        }
        
        .menu-item:active {
            opacity: 0.8;
        }
        
        .back-button {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 16px;
            cursor: pointer;
        }
        
        .hidden {
            display: none;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #999);
        }
    </style>
</head>
<body>
    <!-- Главное меню -->
    <div id="main-menu">
        <div class="header">
            <h1>🏛️ Музей искусств</h1>
            <p>Интерактивный гид</p>
        </div>
        
        <div class="menu-grid">
            <div class="menu-item" onclick="showSection('museum')">О музее</div>
            <div class="menu-item" onclick="showSection('exhibitions')">Выставки</div>
            <div class="menu-item" onclick="showSection('events')">Мероприятия</div>
            <div class="menu-item" onclick="showSection('contacts')">Контакты</div>
        </div>
        
        <div class="section">
            <div class="section-title">Рекомендуем сегодня</div>
            <div id="featured-events"></div>
        </div>
    </div>
    
    <!-- Секция "О музее" -->
    <div id="museum-section" class="hidden">
        <div class="back-button" onclick="showMainMenu()">← Назад</div>
        <div class="header">
            <h1>О музее</h1>
        </div>
        <div class="section" id="museum-info"></div>
    </div>
    
    <!-- Секция "Выставки" -->
    <div id="exhibitions-section" class="hidden">
        <div class="back-button" onclick="showMainMenu()">← Назад</div>
        <div class="header">
            <h1>Выставки</h1>
        </div>
        <div class="section" id="exhibitions-list"></div>
    </div>
    
    <!-- Секция "Мероприятия" -->
    <div id="events-section" class="hidden">
        <div class="back-button" onclick="showMainMenu()">← Назад</div>
        <div class="header">
            <h1>Мероприятия</h1>
        </div>
        <div class="section" id="events-list"></div>
    </div>
    
    <!-- Секция "Контакты" -->
    <div id="contacts-section" class="hidden">
        <div class="back-button" onclick="showMainMenu()">← Назад</div>
        <div class="header">
            <h1>Контакты</h1>
        </div>
        <div class="section" id="contacts-info"></div>
    </div>
    
    <!-- Индикатор загрузки -->
    <div id="loading" class="loading hidden">Загрузка...</div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        
        // Расширяем приложение на весь экран
        tg.expand();
        
        // Устанавливаем цвет кнопки
        tg.setHeaderColor('secondary_bg_color');
        
        // Данные музея
        const museumData = {
            name: 'Самарский областной художественный музей',
            address: 'ул. Куйбышева, 92, Самара',
            workHours: '10:00 - 20:00 (ежедневно)',
            phone: '+7 (905) 37 238-65',
            website: 'artmus.ru',
            priceInfo: 'Стоимость входного билета: дети до 16 лет - бесплатно, взрослые – 100 рублей, пенсионеры – 50 рублей.',
            description: 'Крупнейший музей искусства в Самаре, известен своими неповторимыми экспозициями и интересными лекциями для жителей города а так же гостей. Самарский областной художественный музей был основан в 1897 году. Инициатором его создания выступил местный художник и меценат Константин Павлович Головкин. Изначально он был организован как художественный отдел при Самарском Публичном музее на основе коллекции, переданной в дар местными художниками.'
        };
        
        // Выставки
        const exhibitions = [
            {
                name: 'Обзорная экскурсия',
                description: 'Включает знакомство с собранием музея, формированием  уникальной коллекции, а именно: русского религиозного искусства, русского светского искусства XVIII-XX вв., авангарда, западноевропейского искусства и коллекции Востока.',
                type: 'permanent',
                halls: ['Зал античного искусства', 'Зал эпохи Возрождения', 'Зал импрессионистов']
            },
            {
                name: 'Современное искусство 2026',
                description: 'Экспозиция представляет широкий срез актуального художественного процесса в России — от признанных мастеров до молодых авторов. Здесь живопись и графика соседствуют со скульптурой, арт-фотографией и экспериментальными формами. Выставка демонстрирует всё многообразие стилей и направлений: от преемственности классической школы и академического реализма до смелых поисков современных импрессионистов и концептуалистов. Это уникальная возможность увидеть, как художники осмысляют вечные ценности и вызовы сегодняшнего дня, создавая многоголосый портрет современной России.',
                type: 'temporary',
                dates: '03.12.2026 - 30.05.2026',
                curator: 'Анна Иванова'
            },
            {
                name: 'Фотография 20 века',
                description: 'Приглашаем вас в путешествие по драматичному и великому XX столетию, увиденному через объектив фотокамеры. Экспозиция охватывает путь фотографии от авангардных экспериментов 1920-х до философских наблюдений 1980-х. Вы увидите, как менялся визуальный язык: от пикториализма, подражающего живописи, к жесткому документальному репортажу и смелым опытам фотоавангарда Александра Родченко и Эль Лисицкого .',
                type: 'temporary',
                dates: '03.15.2026 - 30.07.2026',
                curator='Петр Сидоров'
            },
            {
                name='Великие имена русского пейзажа',
                description='Экскурсия предназначена для зрителей всех возрастов и познакомит с коллекцией пейзажного искусства XVIII-XX вв. Наш музей располагает большим количеством произведений замечательных русских художников:  родоначальников жанра - Сильвестра Щедрина и Михаила Лебедева, мастера морского пейзажа Ивана Айвазовского, тонкого знатока природы Алексея Саврасова, популярного пейзажиста Ивана Шишкина, знаменитого мастера среднерусского пейзажа Исаака Левитана, а также пейзажами А.И.Куинджи, К.Ф. Богаевского, Н.К. Рериха, Д.Д. Бурлюка и других. Посетители смогут познакомиться с разными типами пейзажа, научатся различать их оттенки, узнают о сложной и подчас трагической судьбе русских художников.',
                type='temporary',
                dates: '03.15.2026 - 30.06.2026',
                curator: 'Анна Сидорова'
            }
        ];
        
        // Мероприятия
        const events = [
            {
                name: 'Обзорная экскурсия',
                description: 'Знакомство с основными экспонатами и историей музея',
                date: 'Завтра в 15:00',
                price: '300 руб.',
                location: 'Главный холл'
            },
            {
                name: 'Лекция "Искусство Возрождения',
                description: 'Лекция о великих художниках эпохи Возрождения',
                date: 'Послезавтра в 18:00',
                price: '200 руб.',
                location: 'Лекционный зал'
            },
            {
                name: 'Мастер-класс для детей',
                description: 'Краткий мастер-класс по живописи гуашью для детей. Знакомство с материалом, смешивание красок и создание яркого рисунка. Идеально для первого опыта в рисовании. Все материалы включены. Продолжительность: 120 минут.',
                date: 'Послезавтра в 12:00',
                price: '200 руб.',
                location: 'Лекционный зал'
            }
        ];
        
        // Функции навигации
        function showMainMenu() {
            hideAllSections();
            document.getElementById('main-menu').classList.remove('hidden');
        }
        
        function showSection(section) {
            hideAllSections();
            document.getElementById(section + '-section').classList.remove('hidden');
            
            switch(section) {
                case 'museum':
                    loadMuseumInfo();
                    break;
                case 'exhibitions':
                    loadExhibitions();
                    break;
                case 'events':
                    loadEvents();
                    break;
                case 'contacts':
                    loadContacts();
                    break;
            }
        }
        
        function hideAllSections() {
            const sections = ['main-menu', 'museum-section', 'exhibitions-section', 'events-section', 'contacts-section'];
            sections.forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
        }
        
        // Загрузка данных
        function loadMuseumInfo() {
            const container = document.getElementById('museum-info');
            container.innerHTML = `
                <div class="card">
                    <div class="card-title">${museumData.name}</div>
                    <div class="card-description">${museumData.description}</div>
                    <div class="card-meta">
                        <span>📍 ${museumData.address}</span>
                    </div>
                    <div class="card-meta">
                        <span>🕒 ${museumData.workHours}</span>
                    </div>
                    <div class="card-meta">
                        <span>📞 ${museumData.phone}</span>
                    </div>
                    <div class="card-meta">
                        <span>💰 ${museumData.priceInfo}</span>
                    </div>
                </div>
            `;
        }
        
        function loadExhibitions() {
            const container = document.getElementById('exhibitions-list');
            let html = '';
            
            exhibitions.forEach(ex => {
                html += `
                    <div class="card">
                        <div class="card-title">${ex.name}</div>
                        <div class="card-description">${ex.description}</div>
                        ${ex.dates ? `<div class="card-meta">📅 ${ex.dates}</div>` : ''}
                        ${ex.curator ? `<div class="card-meta">👤 Куратор: ${ex.curator}</div>` : ''}
                        ${ex.halls ? `<div class="card-meta">🏛️ Залы: ${ex.halls.join(', ')}</div>` : ''}
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function loadEvents() {
            const container = document.getElementById('events-list');
            let html = '';
            
            events.forEach(event => {
                html += `
                    <div class="card" onclick="bookEvent('${event.name}')">
                        <div class="card-title">${event.name}</div>
                        <div class="card-description">${event.description}</div>
                        <div class="card-meta">
                            <span>📅 ${event.date}</span>
                            <span>💰 ${event.price}</span>
                        </div>
                        <div class="card-meta">📍 ${event.location}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function loadContacts() {
            const container = document.getElementById('contacts-info');
            container.innerHTML = `
                <div class="card">
                    <div class="card-title">Контактная информация</div>
                    <div class="card-meta">📱 Телефон: ${museumData.phone}</div>
                    <div class="card-meta">📧 Email: info@${museumData.website}</div>
                    <div class="card-meta">🌐 Сайт: www.${museumData.website}</div>
                    <div class="card-meta">📍 Адрес: ${museumData.address}</div>
                </div>
            `;
        }
        
        function loadFeaturedEvents() {
            const container = document.getElementById('featured-events');
            let html = '';
            
            events.slice(0, 2).forEach(event => {
                html += `
                    <div class="card" onclick="showSection('events')">
                        <div class="card-title">${event.name}</div>
                        <div class="card-meta">📅 ${event.date}</div>
                        <div class="card-meta">💰 ${event.price}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // Взаимодействие с ботом
        function bookEvent(eventName) {
            tg.sendData(JSON.stringify({
                action: 'book_ticket',
                event: eventName
            }));
            
            tg.showAlert(`Вы выбрали: ${eventName}`);
        }
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            loadFeaturedEvents();
            
            tg.MainButton.setText('Закрыть');
            tg.MainButton.onClick(function() {
                tg.close();
            });
        });
    </script>
</body>
</html>
